name: main

on: [push]

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: "./src ./test"
          exclude: "./lib ./tools"
          extensions: "h,cpp"
          clangFormatVersion: 18.1.8
          style: file
  build-debug:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86]

    steps:
      - uses: actions/checkout@v6

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Remove standalone LLVM from PATH (fix CMake picking up wrong clang-cl)
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Program Files\LLVM*' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: |
            ./vcpkg/packages
            ./vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v3
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('CMakePresets.json') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-${{ matrix.arch }}-

      - name: CMake Setup
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --preset vcpkg-win64-x86

      - name: CMake Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --build build --config Debug --parallel $env:NUMBER_OF_PROCESSORS

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mupen-release
          path: build/out
          retention-days: 14
  build-release:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86]

    steps:
      - uses: actions/checkout@v6

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Remove standalone LLVM from PATH (fix CMake picking up wrong clang-cl)
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Program Files\LLVM*' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: |
            ./vcpkg/packages
            ./vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v3
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('CMakePresets.json') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-${{ matrix.arch }}-

      - name: CMake Setup
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --preset vcpkg-win64-x86-release

      - name: CMake Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mupen-debug
          path: build/out
          retention-days: 14
  test:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86]

    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Remove standalone LLVM from PATH (fix CMake picking up wrong clang-cl)
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Program Files\LLVM*' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: CMake Setup
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --preset vcpkg-win64-x86-release

      - name: CMake Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --build build

      - name: CMake Test
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: ctest --test-dir build
